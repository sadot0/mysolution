# Nginx config for mysolution.uz

# Redirect www to non-www
server {
    listen 80;
    server_name www.mysolution.uz;
    return 301 https://mysolution.uz$request_uri;
}

# Main site - Landing page
server {
    listen 80;
    server_name mysolution.uz;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Landing + App
server {
    listen 443 ssl http2;
    server_name mysolution.uz;

    ssl_certificate /etc/letsencrypt/live/mysolution.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mysolution.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Landing page (static files from /var/www/mysolution/landing)
    root /var/www/mysolution/landing;
    index index.html;

    # API proxy to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # App routes - serve frontend SPA
    location /login { try_files $uri /app/index.html; }
    location /vacancies { try_files $uri /app/index.html; }
    location /candidates { try_files $uri /app/index.html; }
    location /analytics { try_files $uri /app/index.html; }
    location /settings { try_files $uri /app/index.html; }
    location /admin { try_files $uri /app/index.html; }
    location /support { try_files $uri /app/index.html; }
    location /crm { try_files $uri /app/index.html; }
    location /lms { try_files $uri /app/index.html; }
    location /apply { try_files $uri /app/index.html; }
    location /verify-email { try_files $uri /app/index.html; }

    # App static assets
    location /app/ {
        alias /var/www/mysolution/frontend/;
        try_files $uri $uri/ /app/index.html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # App assets (JS, CSS from Vite build)
    location /assets/ {
        alias /var/www/mysolution/frontend/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Logo files
    location /logo-icon.svg { alias /var/www/mysolution/frontend/logo-icon.svg; }
    location /logo-full.svg { alias /var/www/mysolution/frontend/logo-full.svg; }

    # Landing page fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
