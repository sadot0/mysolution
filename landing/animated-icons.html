<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Icons — Recrutor AI</title>
<style>
  body {
    background: #050505;
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    padding: 60px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .icon-card span {
    color: #888;
    font-size: 13px;
  }
  /* Container for every animated icon */
  .anim-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s ease, filter 0.3s ease;
  }
  .anim-icon:hover {
    transform: scale(1.18);
    filter: drop-shadow(0 0 12px rgba(232, 114, 28, 0.55));
  }
  .anim-icon svg {
    width: 56px;
    height: 56px;
    overflow: visible;
  }
</style>
</head>
<body>

<!-- ============================================ -->
<!-- 1. BRAIN — neural network with pulsing nodes -->
<!-- ============================================ -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="brainGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9A3C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF9A3C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- glow background -->
  <circle cx="28" cy="28" r="26" fill="url(#brainGlow)">
    <animate attributeName="r" values="22;26;22" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- brain left half -->
  <path d="M28 12 C20 12, 14 18, 14 24 C14 27, 15 29, 14 32 C13 35, 15 40, 20 42 C22 43, 25 42, 28 42"
        stroke="#E8721C" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </path>
  <!-- brain right half -->
  <path d="M28 12 C36 12, 42 18, 42 24 C42 27, 41 29, 42 32 C43 35, 41 40, 36 42 C34 43, 31 42, 28 42"
        stroke="#E8721C" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </path>
  <!-- brain center line -->
  <line x1="28" y1="12" x2="28" y2="42" stroke="#E8721C" stroke-width="1.2" stroke-opacity="0.4"/>
  <!-- brain folds left -->
  <path d="M18 22 Q22 24, 28 22" stroke="#FF9A3C" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M16 28 Q22 30, 28 28" stroke="#FF9A3C" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M18 34 Q22 36, 28 34" stroke="#FF9A3C" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- brain folds right -->
  <path d="M38 22 Q34 24, 28 22" stroke="#FF9A3C" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M40 28 Q34 30, 28 28" stroke="#FF9A3C" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M38 34 Q34 36, 28 34" stroke="#FF9A3C" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- pulsing neural nodes -->
  <circle cx="20" cy="20" r="2.5" fill="#FF9A3C">
    <animate attributeName="r" values="2;3.2;2" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="20" r="2.5" fill="#FF9A3C">
    <animate attributeName="r" values="2.5;3.5;2.5" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="22" cy="32" r="2" fill="#E8721C">
    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="34" cy="32" r="2" fill="#E8721C">
    <animate attributeName="r" values="2.2;3.2;2.2" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="26" r="2.5" fill="#FF9A3C">
    <animate attributeName="r" values="2.5;3.8;2.5" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <!-- connecting lines between nodes -->
  <line x1="20" y1="20" x2="28" y2="26" stroke="#FF9A3C" stroke-width="0.8" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.2;0.7;0.2" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="36" y1="20" x2="28" y2="26" stroke="#FF9A3C" stroke-width="0.8" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.5;0.9;0.5" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <line x1="22" y1="32" x2="28" y2="26" stroke="#E8721C" stroke-width="0.8" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="34" y1="32" x2="28" y2="26" stroke="#E8721C" stroke-width="0.8" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="1.6s" repeatCount="indefinite"/>
  </line>
</svg>
</div>
<span>Brain</span>
</div>


<!-- =============================== -->
<!-- 2. CLOCK — rotating hands       -->
<!-- =============================== -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- outer ring -->
  <circle cx="28" cy="28" r="23" stroke="#E8721C" stroke-width="2" fill="none" stroke-opacity="0.8"/>
  <!-- inner subtle glow -->
  <circle cx="28" cy="28" r="20" stroke="#FF9A3C" stroke-width="0.5" fill="none" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- tick marks -->
  <line x1="28" y1="7" x2="28" y2="11" stroke="#FF9A3C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="45" x2="28" y2="49" stroke="#FF9A3C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="28" x2="11" y2="28" stroke="#FF9A3C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="45" y1="28" x2="49" y2="28" stroke="#FF9A3C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- small ticks -->
  <line x1="42.5" y1="13.5" x2="40" y2="16" stroke="#FF9A3C" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="42.5" y1="42.5" x2="40" y2="40" stroke="#FF9A3C" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="13.5" y1="13.5" x2="16" y2="16" stroke="#FF9A3C" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="13.5" y1="42.5" x2="16" y2="40" stroke="#FF9A3C" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- minute hand (long, slower) -->
  <line x1="28" y1="28" x2="28" y2="12" stroke="#E8721C" stroke-width="2" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      from="0 28 28" to="360 28 28" dur="10s" repeatCount="indefinite"/>
  </line>
  <!-- hour hand (short, even slower) -->
  <line x1="28" y1="28" x2="28" y2="17" stroke="#FF9A3C" stroke-width="2.5" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      from="0 28 28" to="360 28 28" dur="60s" repeatCount="indefinite"/>
  </line>
  <!-- center dot -->
  <circle cx="28" cy="28" r="2.5" fill="#E8721C">
    <animate attributeName="r" values="2.5;3;2.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
</div>
<span>Clock</span>
</div>


<!-- ================================= -->
<!-- 3. DOLLAR — spinning/glowing coin -->
<!-- ================================= -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- coin body with scale animation to simulate 3D spin -->
  <g>
    <animateTransform attributeName="transform" type="scale"
      values="1,1; 0.15,1; 1,1" dur="3s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 24,0; 0,0" dur="3s" repeatCount="indefinite" additive="sum"/>
    <!-- coin outer -->
    <circle cx="28" cy="28" r="22" fill="none" stroke="#E8721C" stroke-width="2.5"/>
    <!-- coin inner ring -->
    <circle cx="28" cy="28" r="18" fill="none" stroke="#FF9A3C" stroke-width="0.8" stroke-opacity="0.4"/>
    <!-- dollar S -->
    <path d="M24 22 C24 19, 28 17, 31 18 C34 19, 34 22, 28 24 C22 26, 22 29, 25 31 C28 33, 32 31, 32 28"
          stroke="#FF9A3C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- dollar vertical lines -->
    <line x1="28" y1="15" x2="28" y2="19" stroke="#FF9A3C" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="28" y1="31" x2="28" y2="35" stroke="#FF9A3C" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <!-- glow ring -->
  <circle cx="28" cy="28" r="25" fill="none" stroke="#E8721C" stroke-width="0.5" stroke-opacity="0.3">
    <animate attributeName="r" values="24;27;24" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
</div>
<span>Dollar</span>
</div>


<!-- ====================================== -->
<!-- 4. SHIELD — pulsing/glowing protection -->
<!-- ====================================== -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8721C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8721C" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <!-- shield body -->
  <path d="M28 6 L46 16 L46 28 C46 40, 36 48, 28 52 C20 48, 10 40, 10 28 L10 16 Z"
        fill="url(#shieldGrad)" stroke="#E8721C" stroke-width="2" stroke-linejoin="round">
    <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <!-- scanning line going up and down -->
  <line x1="14" y1="20" x2="42" y2="20" stroke="#FF9A3C" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round">
    <animate attributeName="y1" values="18;44;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="18;44;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
  </line>
  <!-- checkmark inside -->
  <path d="M20 28 L26 34 L38 22" stroke="#FF9A3C" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <!-- outer pulse -->
  <path d="M28 4 L48 14 L48 28 C48 42, 37 50, 28 54 C19 50, 8 42, 8 28 L8 14 Z"
        fill="none" stroke="#E8721C" stroke-width="0.8" stroke-opacity="0.2" stroke-linejoin="round">
    <animate attributeName="stroke-opacity" values="0;0.4;0" dur="2.5s" repeatCount="indefinite"/>
  </path>
</svg>
</div>
<span>Shield</span>
</div>


<!-- ================================== -->
<!-- 5. LIGHTNING — flash/spark effect  -->
<!-- ================================== -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="lightGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- main bolt -->
  <path d="M32 4 L18 26 L26 26 L22 52 L40 24 L30 24 Z"
        fill="#E8721C" fill-opacity="0.15" stroke="#E8721C" stroke-width="2" stroke-linejoin="round"
        filter="url(#lightGlow)">
    <animate attributeName="fill-opacity" values="0.1;0.3;0.1" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <!-- flash burst -->
  <circle cx="28" cy="26" r="3" fill="#FF9A3C" opacity="0">
    <animate attributeName="r" values="0;18;0" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- spark lines -->
  <line x1="14" y1="18" x2="10" y2="14" stroke="#FF9A3C" stroke-width="1.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite" begin="0.2s"/>
  </line>
  <line x1="44" y1="20" x2="48" y2="16" stroke="#FF9A3C" stroke-width="1.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </line>
  <line x1="12" y1="34" x2="8" y2="36" stroke="#FF9A3C" stroke-width="1" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
  </line>
  <line x1="44" y1="34" x2="48" y2="38" stroke="#FF9A3C" stroke-width="1" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite" begin="1.1s"/>
  </line>
  <!-- main bolt brightness pulse -->
  <path d="M32 4 L18 26 L26 26 L22 52 L40 24 L30 24 Z"
        fill="none" stroke="#FF9A3C" stroke-width="1" stroke-linejoin="round" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/>
  </path>
</svg>
</div>
<span>Lightning</span>
</div>

    <animate attributeName="cx" values="24;32;24" dur="2s" repeatCount="indefinite"/>

  <circle cx="28" cy="20" r="1.2" fill="#FF9A3C">
    <animate attributeName="cx" values="32;24;32" dur="2.4s" repeatCount="indefinite"/>

<!-- ================================ -->
<!-- 7. CHART — bars growing up       -->
<!-- ================================ -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- baseline -->
  <line x1="8" y1="48" x2="48" y2="48" stroke="#FF9A3C" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- bar 1 -->
  <rect x="10" y="34" width="7" height="14" rx="2" fill="#E8721C" fill-opacity="0.7">
    <animate attributeName="y" values="42;34;42" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="height" values="6;14;6" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <!-- bar 2 -->
  <rect x="20" y="24" width="7" height="24" rx="2" fill="#E8721C" fill-opacity="0.8">

    <animate attributeName="height" values="10;24;10" dur="2.5s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="fill-opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite" begin="0.2s"/>
  </rect>
  <!-- bar 3 -->
  <rect x="30" y="18" width="7" height="30" rx="2" fill="#FF9A3C" fill-opacity="0.85">
    <animate attributeName="y" values="36;18;36" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="height" values="12;30;12" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="fill-opacity" values="0.4;0.95;0.4" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
  </rect>

  <rect x="40" y="10" width="7" height="38" rx="2" fill="#FF9A3C" fill-opacity="0.9">

    <animate attributeName="fill-opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>

    <animate attributeName="stroke-dashoffset" values="40;0;40" dur="2.5s" repeatCount="indefinite"/>

  <!-- dot on top of trend -->
  <circle cx="44" cy="12" r="2" fill="#FF9A3C" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
</svg>
</div>
<span>Chart</span>
</div>


<!-- ===================================== -->
<!-- 8. ROCKET — with flickering flame     -->
<!-- ===================================== -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- rocket body -->
  <path d="M28 6 C28 6, 20 18, 20 32 L36 32 C36 18, 28 6, 28 6Z"
        fill="none" stroke="#E8721C" stroke-width="2" stroke-linejoin="round">
    <animate attributeName="stroke-opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <!-- nose cone fill -->
  <path d="M28 8 C28 8, 22 18, 22 30 L34 30 C34 18, 28 8, 28 8Z"
        fill="#E8721C" fill-opacity="0.1"/>
  <!-- window -->
  <circle cx="28" cy="22" r="3.5" stroke="#FF9A3C" stroke-width="1.5" fill="none">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="22" r="1.5" fill="#FF9A3C" fill-opacity="0.4"/>
  <!-- left fin -->
  <path d="M20 28 L12 38 L20 34" stroke="#E8721C" stroke-width="1.5" fill="#E8721C" fill-opacity="0.15" stroke-linejoin="round"/>
  <!-- right fin -->
  <path d="M36 28 L44 38 L36 34" stroke="#E8721C" stroke-width="1.5" fill="#E8721C" fill-opacity="0.15" stroke-linejoin="round"/>
  <!-- flame core -->
  <path d="M24 32 Q26 42, 28 48 Q30 42, 32 32" fill="#E8721C" fill-opacity="0.8">
    <animate attributeName="d"
      values="M24 32 Q26 42, 28 48 Q30 42, 32 32;M24 32 Q27 44, 28 50 Q29 44, 32 32;M24 32 Q26 42, 28 48 Q30 42, 32 32"
      dur="0.4s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.6;0.9;0.6" dur="0.3s" repeatCount="indefinite"/>
  </path>
  <!-- flame outer -->
  <path d="M22 32 Q25 40, 28 44 Q31 40, 34 32" fill="#FF9A3C" fill-opacity="0.4">
    <animate attributeName="d"
      values="M22 32 Q25 40, 28 44 Q31 40, 34 32;M23 32 Q26 42, 28 46 Q30 42, 33 32;M22 32 Q25 40, 28 44 Q31 40, 34 32"
      dur="0.35s" repeatCount="indefinite"/>
  </path>
  <!-- flame sparks -->
  <circle cx="26" cy="40" r="1" fill="#FF9A3C">
    <animate attributeName="cy" values="38;48;38" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="42" r="0.8" fill="#E8721C">
    <animate attributeName="cy" values="40;50;40" dur="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <!-- overall subtle hover-bob -->
  <animateTransform attributeName="transform" type="translate" values="0,1;0,-1;0,1" dur="2s" repeatCount="indefinite"/>
</svg>
</div>
<span>Rocket</span>
</div>


<!-- ================================= -->
<!-- 9. GLOBE — rotating wireframe     -->
<!-- ================================= -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- outer circle -->
  <circle cx="28" cy="28" r="22" stroke="#E8721C" stroke-width="1.8" fill="none"/>
  <!-- horizontal lines -->
  <ellipse cx="28" cy="18" rx="18" ry="2" stroke="#FF9A3C" stroke-width="0.8" fill="none" stroke-opacity="0.5"/>
  <ellipse cx="28" cy="28" rx="22" ry="0" stroke="#FF9A3C" stroke-width="0.8" fill="none" stroke-opacity="0.4">
    <animate attributeName="ry" values="0;0;0" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <line x1="6" y1="28" x2="50" y2="28" stroke="#FF9A3C" stroke-width="0.8" stroke-opacity="0.4"/>
  <ellipse cx="28" cy="38" rx="18" ry="2" stroke="#FF9A3C" stroke-width="0.8" fill="none" stroke-opacity="0.5"/>
  <!-- vertical meridian that rotates (simulated with ellipse rx animation) -->
  <ellipse cx="28" cy="28" rx="10" ry="22" stroke="#E8721C" stroke-width="1.2" fill="none" stroke-opacity="0.7">
    <animate attributeName="rx" values="10;22;10;0;10" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- second meridian, offset -->
  <ellipse cx="28" cy="28" rx="18" ry="22" stroke="#FF9A3C" stroke-width="0.8" fill="none" stroke-opacity="0.4">
    <animate attributeName="rx" values="18;0;18;22;18" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- third meridian -->
  <ellipse cx="28" cy="28" rx="4" ry="22" stroke="#FF9A3C" stroke-width="0.8" fill="none" stroke-opacity="0.5">
    <animate attributeName="rx" values="4;20;4;15;4" dur="4s" repeatCount="indefinite" begin="1s"/>
  </ellipse>
  <!-- center glow dot -->
  <circle cx="28" cy="28" r="2" fill="#E8721C" opacity="0.6">
    <animate attributeName="r" values="1.5;3;1.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- pulse ring -->
  <circle cx="28" cy="28" r="22" stroke="#E8721C" stroke-width="0.5" fill="none" opacity="0">
    <animate attributeName="r" values="22;28;22" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
</div>
<span>Globe</span>
</div>


<!-- ================================ -->
<!-- 10. LOCK — locking animation     -->
<!-- ================================ -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- lock body -->
  <rect x="14" y="26" width="28" height="22" rx="4" stroke="#E8721C" stroke-width="2" fill="#E8721C" fill-opacity="0.1">
    <animate attributeName="fill-opacity" values="0.05;0.15;0.05" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- shackle (animated open/close) -->
  <path d="M18 26 L18 18 C18 12, 22 8, 28 8 C34 8, 38 12, 38 18 L38 26"
        stroke="#FF9A3C" stroke-width="2.5" fill="none" stroke-linecap="round">
    <animate attributeName="d"
      values="M18 26 L18 18 C18 12, 22 8, 28 8 C34 8, 38 12, 38 18 L38 26;
              M18 26 L18 18 C18 12, 22 8, 28 8 C34 8, 38 12, 38 14 L38 10;
              M18 26 L18 18 C18 12, 22 8, 28 8 C34 8, 38 12, 38 18 L38 26"
      dur="4s" repeatCount="indefinite"/>
  </path>
  <!-- keyhole -->
  <circle cx="28" cy="34" r="3" fill="#FF9A3C" fill-opacity="0.8">
    <animate attributeName="fill-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <rect x="27" y="35" width="2" height="6" rx="1" fill="#FF9A3C" fill-opacity="0.8">
    <animate attributeName="fill-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </rect>
  <!-- security pulse rings -->
  <rect x="12" y="24" width="32" height="26" rx="6" fill="none" stroke="#E8721C" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x" values="14;10;14" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="26;22;26" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="width" values="28;36;28" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="height" values="22;30;22" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
</div>
<span>Lock</span>
</div>


<!-- =================================== -->
<!-- 11. CHECK — drawing checkmark       -->
<!-- =================================== -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- circle that draws itself -->
  <circle cx="28" cy="28" r="22" stroke="#E8721C" stroke-width="2" fill="none"
          stroke-dasharray="138" stroke-dashoffset="138" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" values="138;0;0;138" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- background circle glow -->
  <circle cx="28" cy="28" r="22" fill="#E8721C" fill-opacity="0">
    <animate attributeName="fill-opacity" values="0;0.08;0.08;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- checkmark that draws -->
  <path d="M17 28 L24 36 L40 18" stroke="#FF9A3C" stroke-width="3" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="42" stroke-dashoffset="42">
    <animate attributeName="stroke-dashoffset" values="42;42;0;0;42" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <!-- success burst particles -->
  <circle cx="40" cy="14" r="1.5" fill="#FF9A3C" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.8;0" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="40;40;40;46;46" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="18;18;18;10;10" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="20" r="1" fill="#E8721C" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.6;0" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="40;40;40;48;48" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="18;18;18;22;22" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="12" r="1" fill="#FF9A3C" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.5;0" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="40;40;40;44;44" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="18;18;18;8;8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
</div>
<span>Check</span>
</div>


<!-- =========================== -->
<!-- 12. STAR — twinkling        -->
<!-- =========================== -->
<div class="icon-card">
<div class="anim-icon">
<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- main star -->
  <path d="M28 6 L33 20 L48 22 L37 32 L40 48 L28 40 L16 48 L19 32 L8 22 L23 20 Z"
        fill="#E8721C" fill-opacity="0.15" stroke="#E8721C" stroke-width="1.8" stroke-linejoin="round">
    <animate attributeName="fill-opacity" values="0.1;0.25;0.1" dur="2s" repeatCount="indefinite"/>
  </path>
  <!-- inner glow star (smaller) -->
  <path d="M28 14 L31 22 L40 23 L33 29 L35 38 L28 34 L21 38 L23 29 L16 23 L25 22 Z"
        fill="#FF9A3C" fill-opacity="0.15" stroke="none">
    <animate attributeName="fill-opacity" values="0.05;0.25;0.05" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </path>
  <!-- twinkle rays -->
  <line x1="28" y1="0" x2="28" y2="4" stroke="#FF9A3C" stroke-width="1.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.8;0" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <line x1="28" y1="52" x2="28" y2="56" stroke="#FF9A3C" stroke-width="1.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.6;0" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
  </line>
  <line x1="0" y1="28" x2="4" y2="28" stroke="#FF9A3C" stroke-width="1.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
  </line>
  <line x1="52" y1="28" x2="56" y2="28" stroke="#FF9A3C" stroke-width="1.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.8s" repeatCount="indefinite" begin="1.2s"/>
  </line>
  <!-- diagonal rays -->
  <line x1="6" y1="6" x2="10" y2="10" stroke="#FF9A3C" stroke-width="0.8" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
  </line>
  <line x1="50" y1="6" x2="46" y2="10" stroke="#FF9A3C" stroke-width="0.8" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
  </line>
  <line x1="6" y1="50" x2="10" y2="46" stroke="#FF9A3C" stroke-width="0.8" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.2s" repeatCount="indefinite" begin="1.1s"/>
  </line>
  <line x1="50" y1="50" x2="46" y2="46" stroke="#FF9A3C" stroke-width="0.8" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.2s" repeatCount="indefinite" begin="1.5s"/>
  </line>
  <!-- center sparkle -->
  <circle cx="28" cy="28" r="2" fill="#FF9A3C">
    <animate attributeName="r" values="1;3;1" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- outer pulse -->
  <path d="M28 6 L33 20 L48 22 L37 32 L40 48 L28 40 L16 48 L19 32 L8 22 L23 20 Z"
        fill="none" stroke="#FF9A3C" stroke-width="0.5" stroke-linejoin="round" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
</div>
<span>Star</span>
</div>
